<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email envoyé - IFRI_MentorLink</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1a4bd4 0%, #0e2fa8 40%, #0a237a 100%);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-confirmation {
      background: white;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
    }
    .icon-envelope {
      font-size: 3.5rem;
      color: #2563eb;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #6c757d;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .btn-retour {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    .btn-retour:hover {
      background: #1d4ed8;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card-confirmation">
      <div class="icon-envelope"><i class="bi bi-envelope-check"></i></div>
    <h1>Email de confirmation envoyé</h1>
    <p>Veuillez vérifier votre boîte email et cliquer sur le lien de confirmation pour activer votre compte.</p>
    {% if confirmation_link %}
    <div style="background:#f1f5f9;border-radius:12px;padding:16px;margin-bottom:20px;text-align:left;word-break:break-all">
      <strong style="font-size:.8rem;color:var(--slate-500)">Mode local — lien de confirmation :</strong>
      <br><a href="{{ confirmation_link }}" style="font-size:.85rem;color:#2563eb">{{ confirmation_link }}</a>
    </div>
    {% endif %}
    <a href="{{ url_for('auth.login') }}" class="btn-retour">Retour à la connexion</a>
  </div>
</body>
</html>
