<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialiser le mot de passe - IFRI_MentorLink</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1a4bd4 0%, #0e2fa8 40%, #0a237a 100%);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
      border: none;
    }
    .icon-key {
      font-size: 3rem;
      color: #2563eb;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #6c757d;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      padding: 0.65rem 1rem;
      font-size: 0.92rem;
      height: 48px;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .input-group-text {
      background: white;
      border: 1.5px solid #e2e8f0;
      border-left: none;
      border-radius: 0 10px 10px 0;
      cursor: pointer;
    }
    .input-group .form-control {
      border-right: none;
      border-radius: 10px 0 0 10px;
    }
    .btn-reinit {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 600;
      font-size: 0.95rem;
      width: 100%;
      transition: background .2s;
    }
    .btn-reinit:hover {
      background: #1d4ed8;
    }
    .back-link {
      display: block;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-key"><i class="bi bi-key"></i></div>
    <h1>Réinitialiser le mot de passe</h1>
    <p class="sub">Choisissez un nouveau mot de passe sécurisé.</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="input-group mb-3">
        <input type="password" name="mot_de_passe" id="mdp" class="form-control" placeholder="Nouveau mot de passe" required />
        <button type="button" class="input-group-text toggle-pw" data-target="mdp"><i class="bi bi-eye-slash"></i></button>
      </div>
      <div class="input-group mb-3">
        <input type="password" name="confirm_mot_de_passe" id="confirm" class="form-control" placeholder="Confirmer le mot de passe" required />
        <button type="button" class="input-group-text toggle-pw" data-target="confirm"><i class="bi bi-eye-slash"></i></button>
      </div>
      <button type="submit" class="btn-reinit">Réinitialiser</button>
    </form>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ 'success' if category=='success' else 'danger' }} mt-3 py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <a href="{{ url_for('auth.login') }}" class="back-link">Retour à la connexion</a>
  </div>

  <script>
    document.querySelectorAll('.toggle-pw').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var input = document.getElementById(this.dataset.target);
        if (!input) return;
        var icon = this.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
          input.type = 'password';
          icon.classList.replace('bi-eye', 'bi-eye-slash');
        }
      });
    });
  </script>
</body>
</html>
