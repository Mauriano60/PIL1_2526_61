<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mot de passe oublié - IFRI_MentorLink</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1a4bd4 0%, #0e2fa8 40%, #0a237a 100%);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
      border: none;
    }
    .icon-lock {
      font-size: 3rem;
      color: #2563eb;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #6c757d;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      padding: 0.65rem 1rem;
      font-size: 0.92rem;
      height: 48px;
    }
    .form-control:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .btn-envoyer {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.75rem;
      font-weight: 600;
      font-size: 0.95rem;
      width: 100%;
      transition: background .2s;
    }
    .btn-envoyer:hover {
      background: #1d4ed8;
    }
    .back-link {
      display: block;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-lock"><i class="bi bi-lock"></i></div>
    <h1>Mot de passe oublié</h1>
    <p class="sub">Saisissez votre adresse email pour recevoir un lien de réinitialisation.</p>
    <form method="POST">
      <input type="email" name="email" class="form-control mb-3" placeholder="Votre adresse email" required />
      <button type="submit" class="btn-envoyer">Envoyer le lien</button>
    </form>
    <a href="{{ url_for('auth.login') }}" class="back-link">Retour à la connexion</a>
  </div>
</body>
</html>
